<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fuel Cost Calculator WA</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; background:#f5f5f5; color:#111; }
.container { max-width: 700px; margin: 40px auto; background:#fff; padding: 20px; border-radius: 10px; }
h1 { font-size: 24px; }
label { display:block; margin-top: 12px; }
input { width:100%; padding:10px; margin-top:5px; }
button { margin-top: 15px; padding: 10px; width:100%; background:#111; color:#fff; border:none; cursor:pointer; }
.result { margin-top: 20px; font-size: 18px; font-weight: bold; }
.adbox { margin-top: 20px; padding: 15px; border: 1px dashed #999; text-align:center; font-size: 14px; }
.small { font-size: 12px; color:#666; margin-top:10px; }
</style>
</head>
<body>
<div class="container">
<h1>Fuel Cost Calculator (Western Australia)</h1>
<p>Estimate your driving cost per trip and per week.</p>

<label>Distance (km)</label>
<input id="distance" type="number" placeholder="e.g. 50" />

<label>Fuel efficiency (L/100km)</label>
<input id="efficiency" type="number" placeholder="e.g. 9" />

<label>Fuel price ($ per litre)</label>
<input id="price" type="number" placeholder="e.g. 2.10" />

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<div class="adbox">Ad Space (Google AdSense / Affiliate Banner)</div>

<p class="small">Tip: Save this page for quick trip cost estimates. Share it with friends who drive frequently.</p>
</div>

<script>
function calculate() {
    const distance = parseFloat(document.getElementById('distance').value);
    const efficiency = parseFloat(document.getElementById('efficiency').value);
    const price = parseFloat(document.getElementById('price').value);

    if (isNaN(distance) || isNaN(efficiency) || isNaN(price)) {
        document.getElementById('result').innerText = 'Enter all values.';
        return;
    }

    const litresUsed = (distance * efficiency) / 100;
    const cost = litresUsed * price;

    document.getElementById('result').innerText = 
        'Estimated trip cost: $' + cost.toFixed(2);
}
</script>
</body>
</html>
